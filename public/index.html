<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pulse — self-building agent board</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Pulse<span class="dot">●</span></div>
      <nav class="nav" id="nav">
        <button data-view="board" class="active">Board</button>
        <button data-view="runs">Runs</button>
        <button data-view="analytics">Analytics</button>
      </nav>
      <button id="create-btn" class="primary">+ Create</button>
    </header>

    <div class="view" id="view-board"></div>
    <div class="view" id="view-runs" hidden></div>
    <div class="view" id="view-analytics" hidden></div>

    <!-- issue modal -->
    <div class="scrim" id="scrim" hidden></div>
    <section class="issue" id="issue" hidden></section>

    <!-- create modal -->
    <div class="scrim" id="create-scrim" hidden></div>
    <form class="modal create" id="create-modal" hidden>
      <h3>Create issue</h3>
      <label class="fld">Summary<input id="c-title" placeholder="e.g. Add a /health endpoint" autocomplete="off" required /></label>
      <div class="row">
        <label class="fld">Type<select id="c-type"><option value="feature">✨ Feature</option><option value="bug">🐞 Bug</option></select></label>
        <label class="fld">Priority<select id="c-priority"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select></label>
      </div>
      <label class="fld">Description<textarea id="c-desc" rows="4" placeholder="Context, problem statement, acceptance criteria…"></textarea></label>
      <div class="fld">Attachments
        <div class="dropzone" id="c-drop">Paste a screenshot, or <label class="link">browse<input type="file" id="c-file" accept="image/*" multiple hidden /></label></div>
        <div class="thumbs" id="c-thumbs"></div>
      </div>
      <div class="actions">
        <button type="button" id="c-cancel">Cancel</button>
        <button type="submit" class="primary">Create</button>
      </div>
    </form>

    <script type="module" src="app.js"></script>
  </body>
</html>
